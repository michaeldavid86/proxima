<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Mission-control dark background -->
  <rect width="32" height="32" fill="#0a0e14"/>

  <!-- Left solar panel -->
  <rect x="1.5" y="12.5" width="9.5" height="7" fill="#00d4ff" fill-opacity="0.15" stroke="#00d4ff" stroke-width="1.2"/>
  <line x1="6.25" y1="12.5" x2="6.25" y2="19.5" stroke="#00d4ff" stroke-width="0.6" opacity="0.7"/>

  <!-- Right solar panel -->
  <rect x="21" y="12.5" width="9.5" height="7" fill="#00d4ff" fill-opacity="0.15" stroke="#00d4ff" stroke-width="1.2"/>
  <line x1="25.75" y1="12.5" x2="25.75" y2="19.5" stroke="#00d4ff" stroke-width="0.6" opacity="0.7"/>

  <!-- Connecting struts to body -->
  <line x1="11" y1="16" x2="13" y2="16" stroke="#00d4ff" stroke-width="1.2"/>
  <line x1="19" y1="16" x2="21" y2="16" stroke="#00d4ff" stroke-width="1.2"/>

  <!-- Spacecraft body -->
  <rect x="13" y="10.5" width="6" height="11" fill="#00d4ff"/>

  <!-- Antenna mast -->
  <line x1="16" y1="10.5" x2="16" y2="5.5" stroke="#00d4ff" stroke-width="1.2"/>

  <!-- Amber status light at antenna tip -->
  <circle cx="16" cy="4.5" r="1.6" fill="#ffb800"/>
</svg>
